<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>导航栏交互原型</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.3/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.3/Flip.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:system-ui,"Microsoft YaHei","PingFang SC",sans-serif; background:#EDF1F6; }

.navbar {
  position:fixed; top:0; left:0; right:0; z-index:100; height:56px;
  background:#FFF9F0; border-bottom:1px solid #BAD6EB;
  box-shadow:0 1px 3px rgba(8,31,92,0.06);
}
.nav-inner {
  max-width:900px; margin:0 auto; height:100%;
  display:flex; align-items:center; padding:0 24px;
}
.logo {
  font-size:18px; font-weight:700; color:#334EAC;
  flex-shrink:0; letter-spacing:1px;
}
.nav-center { flex:1; display:flex; justify-content:center; }
.nav-links {
  display:flex; list-style:none; gap:2rem; align-items:center;
}
.nav-item {
  position:relative;
}
.nav-item a {
  text-decoration:none; color:#6B7280; font-weight:600;
  font-size:15px; cursor:pointer; transition:color 0.2s;
  padding:16px 0; display:inline-block;
}
.nav-item a:hover { color:#334EAC; }

/* 初始激活态下划线 */
.active-nav {
  position:absolute;
  height:2px; background:#334EAC; border-radius:2px;
  left:0; bottom:8px; width:100%;
}
.nav-user { font-size:13px; color:#1F2937; flex-shrink:0; }

.content { margin-top:80px; padding:24px; text-align:center; }
h2 { font-size:24px; color:#334EAC; margin-bottom:16px; }
p { color:#6B7280; font-size:14px; }
.role-bar { display:flex; justify-content:center; gap:8px; padding:24px 0 32px; }
.role-btn {
  padding:6px 20px; border-radius:20px; border:1.5px solid #BAD6EB;
  background:#FFF9F0; color:#6B7280; cursor:pointer; font-size:13px;
  font-family:inherit; transition:all 0.2s;
}
.role-btn.active { background:#334EAC; color:#fff; border-color:#334EAC; }
</style>
</head>
<body>
<nav class="navbar">
  <div class="nav-inner">
    <div class="logo">智慧学生</div>
    <div class="nav-center">
      <ul class="nav-links" id="navLinks">
        <!-- JS 渲染 -->
      </ul>
    </div>
    <div class="nav-user" id="userName">张同学</div>
  </div>
</nav>

<div class="content">
  <div class="role-bar">
    <button class="role-btn active" onclick="switchRole('student')">学生端</button>
    <button class="role-btn" onclick="switchRole('teacher')">教师端</button>
    <button class="role-btn" onclick="switchRole('admin')">管理端</button>
  </div>
  <h2 id="pageTitle">学习空间</h2>
  <p>成绩 · 作业 · 考试 · 错题本 · 课表</p>
</div>

<script>
gsap.registerPlugin(Flip);

const ROLES = {
  student: { name:'张同学', items:['学习','生活','我的'], title:'学习空间' },
  teacher: { name:'李老师', items:['教学','管理','我的'], title:'教学中心' },
  admin:   { name:'管理员', items:['用户管理','教务','图书','后勤','数据','设置'], title:'管理后台' }
}
let role = 'student'
const container = document.getElementById('navLinks')

function build(r) {
  const cfg = ROLES[r]
  container.innerHTML = ''
  cfg.items.forEach((label, i) => {
    const div = document.createElement('div')
    div.className = 'nav-item'
    div.innerHTML = '<a>' + label + '</a>'
    if (i === 0) {
      div.innerHTML += '<div class="active-nav"></div>'
    }
    div.querySelector('a').addEventListener('click', function(e) {
      onClick(this)
    })
    container.appendChild(div)
  })
  document.getElementById('userName').textContent = cfg.name
}

function onClick(link) {
  // 1. 所有链接恢复默认色
  const allLinks = container.querySelectorAll('.nav-item a')
  gsap.to(allLinks, { color: '#6B7280', duration: 0.15 })

  // 2. 当前链接高亮
  gsap.to(link, { color: '#334EAC', duration: 0.15 })

  // 3. 获取当前 active-nav 的位置状态
  const activeNav = container.querySelector('.active-nav')
  if (!activeNav) return
  const state = Flip.getState(activeNav)

  // 4. 把 active-nav 移动到当前点击项下面
  link.closest('.nav-item').appendChild(activeNav)

  // 5. Flip 动画
  Flip.from(state, {
    duration: 0.6,
    ease: 'elastic.out(1, 0.5)',
    absolute: true
  })
}

function switchRole(r) {
  if (r === role) return
  role = r
  document.querySelectorAll('.role-btn').forEach(b => {
    b.classList.toggle('active',
      (r==='student' && b.textContent.includes('学生')) ||
      (r==='teacher' && b.textContent.includes('教师')) ||
      (r==='admin' && b.textContent.includes('管理')))
  })
  build(r)
}

build('student')
</script>
</body>
</html>
