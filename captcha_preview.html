<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录验证码交互原型</title>
<style>
:root {
  --color-primary:        #334EAC;
  --color-primary-dark:   #081F5C;
  --color-primary-light:  #7096D1;
  --color-bg:             #F9FAFB;
  --color-bg-card:        #FFFFFF;
  --color-border:         #E5E7EB;
  --color-success:        #10B981;
  --color-warning:        #E8A838;
  --color-danger:         #EF4444;
  --color-text:           #1F2937;
  --color-text-secondary: #6B7280;
  --font-family:          "Inter", "Noto Sans SC", "PingFang SC", system-ui, sans-serif;
  --radius-lg:            12px;
  --shadow-lg:            0 10px 15px rgba(8,31,92,0.1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: var(--font-family);
  background-color: var(--color-bg);
  color: var(--color-text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.login-container {
  width: 100%;
  max-width: 420px;
  background: var(--color-primary-dark);
  background: linear-gradient(135deg, var(--color-primary-dark) 0%, var(--color-primary) 50%, var(--color-primary-light) 100%);
  padding: 24px;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-card {
  width: 100%;
  padding: 40px 32px;
  background: var(--color-bg-card);
  border-radius: var(--radius-lg);
  box-shadow: 0 4px 6px rgba(0,0,0,0.05);
  text-align: center;
}

.login-title {
  font-size: 24px;
  color: var(--color-primary);
  margin-bottom: 4px;
  font-weight: 700;
}

.login-subtitle {
  font-size: 13px;
  color: var(--color-text-secondary);
  margin-bottom: 24px;
}

.form-item {
  margin-bottom: 18px;
  text-align: left;
}

.form-label {
  display: block;
  font-size: 13px;
  color: var(--color-text-secondary);
  margin-bottom: 6px;
  font-weight: 500;
}

.input-field {
  width: 100%;
  height: 40px;
  padding: 0 12px;
  border: 1px solid var(--color-border);
  border-radius: 6px;
  font-size: 14px;
  color: var(--color-text);
  outline: none;
  transition: border-color 0.2s;
}

.input-field:focus {
  border-color: var(--color-primary);
}

.captcha-container {
  display: flex;
  gap: 12px;
}

.captcha-input {
  flex: 1;
}

.captcha-canvas-wrapper {
  width: 120px;
  height: 40px;
  border: 1px solid var(--color-border);
  border-radius: 6px;
  overflow: hidden;
  cursor: pointer;
  background: #f3f4f6;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  user-select: none;
  transition: border-color 0.2s;
}

.captcha-canvas-wrapper:hover {
  border-color: var(--color-primary-light);
}

.captcha-canvas-wrapper::after {
  content: "点击刷新";
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(0,0,0,0.6);
  color: #fff;
  font-size: 9px;
  padding: 1px 0;
  text-align: center;
  opacity: 0;
  transition: opacity 0.2s;
}

.captcha-canvas-wrapper:hover::after {
  opacity: 1;
}

.login-btn {
  width: 100%;
  height: 42px;
  background-color: var(--color-primary);
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background-color 0.2s;
  margin-top: 10px;
}

.login-btn:hover {
  background-color: var(--color-primary-dark);
}

.login-hint {
  margin-top: 16px;
  font-size: 12px;
  color: var(--color-text-secondary);
}

.feedback-msg {
  margin-top: 12px;
  padding: 8px 12px;
  border-radius: 4px;
  font-size: 13px;
  display: none;
}

.feedback-msg.success {
  display: block;
  background-color: #ecfdf5;
  color: var(--color-success);
  border: 1px solid #a7f3d0;
}

.feedback-msg.error {
  display: block;
  background-color: #fef2f2;
  color: var(--color-danger);
  border: 1px solid #fecaca;
}

.mode-info {
  margin-top: 12px;
  font-size: 12px;
  color: var(--color-primary);
  background: #eff6ff;
  padding: 6px 10px;
  border-radius: 4px;
  display: inline-block;
}

.control-panel {
  margin-top: 24px;
  background: white;
  padding: 16px 24px;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 420px;
  text-align: left;
}

.control-title {
  font-size: 15px;
  font-weight: bold;
  margin-bottom: 8px;
  color: var(--color-primary-dark);
}
</style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <h1 class="login-title">智慧学生管理系统</h1>
    <p class="login-subtitle">验证码功能体验原型</p>
    
    <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
      <div class="form-item">
        <label class="form-label">用户名</label>
        <input type="text" class="input-field" placeholder="admin" value="admin" disabled>
      </div>
      
      <div class="form-item">
        <label class="form-label">密码</label>
        <input type="password" class="input-field" placeholder="••••••••" value="admin123" disabled>
      </div>
      
      <div class="form-item">
        <label class="form-label">验证码</label>
        <div class="captcha-container">
          <input type="text" id="captchaInput" class="input-field captcha-input" placeholder="请输入验证码" required autocomplete="off">
          <div class="captcha-canvas-wrapper" id="captchaWrapper" onclick="refreshCaptcha()">
            <canvas id="captchaCanvas" width="120" height="40"></canvas>
          </div>
        </div>
        <div id="modeInfo" class="mode-info">当前验证码：4位字符 (初始)</div>
      </div>
      
      <button type="submit" class="login-btn">登 录</button>
    </form>
    
    <div id="feedback" class="feedback-msg"></div>
    <p class="login-hint">点击验证码图片可以刷新切换模式</p>
  </div>
</div>

<div class="control-panel">
  <div class="control-title">📋 验证码生成规则说明</div>
  <p style="font-size: 13px; line-height: 1.6; color: var(--color-text-secondary);">
    1. <strong>首次加载：</strong> 默认生成4位随机字符（大小写字母 + 数字），方便快速输入。<br>
    2. <strong>点击刷新：</strong> 每次点击验证码图片都会刷新。50% 概率生成4位字符，50% 概率生成加减法数学算式（例如：<code>7 + 5 = ?</code> 或 <code>14 - 6 = ?</code>）。<br>
    3. <strong>算式验证：</strong> 如果是加减法，用户输入计算出的<strong>数字结果</strong>即可（例如：<code>12</code> 或 <code>8</code>）。<br>
    4. <strong>字符验证：</strong> 字母不区分大小写，提升用户体验。
  </p>
</div>

<script>
let captchaAnswer = '';
let isMathMode = false;
let clickCount = 0; // 记录点击次数以保证一开始是4字符，后续刷新切换

function generateRandomChar() {
  const chars = '23456789abcdefghjkmnpqrstuvwxyzABCDEFGHJKMNPQRSTUVWXYZ'; // 去掉易混淆的 0, 1, o, I, l
  return chars.charAt(Math.floor(Math.random() * chars.length));
}

function refreshCaptcha() {
  clickCount++;
  const canvas = document.getElementById('captchaCanvas');
  const ctx = canvas.getContext('2d');
  
  // 决定当前模式：一开始（clickCount=0或1）为4字符，之后随机
  if (clickCount === 1) {
    isMathMode = false;
  } else {
    isMathMode = Math.random() < 0.5;
  }
  
  document.getElementById('modeInfo').innerText = isMathMode 
    ? '当前验证码：加减法算式 (已刷新)' 
    : '当前验证码：4位字符 (已刷新)';

  // 1. 清空画布并绘制背景
  ctx.fillStyle = '#f3f4f6';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  let displayText = '';
  
  if (isMathMode) {
    // 生成加减法算式
    const isPlus = Math.random() < 0.5;
    if (isPlus) {
      const num1 = Math.floor(Math.random() * 10) + 1; // 1-10
      const num2 = Math.floor(Math.random() * 10) + 1; // 1-10
      displayText = `${num1} + ${num2} = ?`;
      captchaAnswer = (num1 + num2).toString();
    } else {
      const num1 = Math.floor(Math.random() * 12) + 6; // 6-17
      const num2 = Math.floor(Math.random() * 5) + 1;  // 1-5 (保证结果为正数)
      displayText = `${num1} - ${num2} = ?`;
      captchaAnswer = (num1 - num2).toString();
    }
  } else {
    // 生成4位随机字符
    let code = '';
    for (let i = 0; i < 4; i++) {
      code += generateRandomChar();
    }
    displayText = code;
    captchaAnswer = code.toLowerCase(); // 统一转为小写对比
  }

  // 2. 绘制一些干扰噪点和线条
  // 噪点
  for (let i = 0; i < 30; i++) {
    ctx.fillStyle = getRandomColor(150, 220);
    ctx.beginPath();
    ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, 1.5, 0, 2 * Math.PI);
    ctx.fill();
  }
  
  // 干扰线
  for (let i = 0; i < 3; i++) {
    ctx.strokeStyle = getRandomColor(120, 200);
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
    ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
    ctx.stroke();
  }

  // 3. 绘制文字 (每个字符带点旋转和扭曲，更安全也更专业)
  ctx.textBaseline = 'middle';
  
  if (isMathMode) {
    // 算式作为一个整体或分段绘制
    ctx.font = 'bold 20px "Cascadia Code", monospace';
    ctx.fillStyle = '#334EAC';
    // 居中稍微扭曲
    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2);
    // 随机微旋转
    ctx.rotate((Math.random() - 0.5) * 0.1);
    ctx.textAlign = 'center';
    ctx.fillText(displayText, 0, 0);
    ctx.restore();
  } else {
    // 4个字符分别绘制，增加旋转
    ctx.font = 'bold 22px "Cascadia Code", monospace';
    const charWidth = canvas.width / 5;
    for (let i = 0; i < displayText.length; i++) {
      ctx.save();
      const x = (i + 1) * charWidth - 5 + (Math.random() - 0.5) * 5;
      const y = canvas.height / 2 + (Math.random() - 0.5) * 6;
      ctx.translate(x, y);
      ctx.rotate((Math.random() - 0.5) * 0.4); // 旋转度
      ctx.fillStyle = getRandomColor(20, 100); // 偏深色文字
      ctx.fillText(displayText[i], -8, 0);
      ctx.restore();
    }
  }
  
  // 清空输入框并聚焦
  document.getElementById('captchaInput').value = '';
  document.getElementById('captchaInput').focus();
  document.getElementById('feedback').className = 'feedback-msg';
  document.getElementById('feedback').innerText = '';
}

function getRandomColor(min, max) {
  const r = Math.floor(Math.random() * (max - min) + min);
  const g = Math.floor(Math.random() * (max - min) + min);
  const b = Math.floor(Math.random() * (max - min) + min);
  return `rgb(${r},${g},${b})`;
}

function handleLogin() {
  const inputVal = document.getElementById('captchaInput').value.trim();
  const feedback = document.getElementById('feedback');
  
  let isCorrect = false;
  if (isMathMode) {
    isCorrect = inputVal === captchaAnswer;
  } else {
    isCorrect = inputVal.toLowerCase() === captchaAnswer;
  }
  
  if (isCorrect) {
    feedback.className = 'feedback-msg success';
    feedback.innerText = '验证码正确！登录成功 (模拟)';
  } else {
    feedback.className = 'feedback-msg error';
    feedback.innerText = '验证码错误，请重新输入';
    refreshCaptcha(); // 验证失败自动刷新
  }
}

// 首次加载
window.onload = function() {
  refreshCaptcha();
};
</script>

</body>
</html>
